- id: veh_taltos_class_mars_cargo_lander
  pretty_name: Taltos-class Mars Cargo Lander
  name: Taltos-class Mars Cargo Lander
  type: vehicle
  idea_reference: IDEA-502
  description: Reusable Mars orbit-to-surface cargo lander used during the Race for Sol for freight delivery between orbital logistics hubs and surface landing pads.
  notes: The class is built around repeated cargo descent and unloading operations on Mars. The design uses detachable modular lifting wings that can be removed and remounted in reversed orientation depending on mission profile and servicing state.
  vehicle_class: mars_cargo_lander

  produced_by: []
  uses_technology: []
  operated_by: []

  intended_roles:
    - mars_orbit_to_surface_cargo_delivery
    - cargo_landing_pad_servicing
    - martian_surface_freight_unloading

  supported_infrastructure:
    - infra_mars_orbital_logistics_hubs
    - infra_mars_surface_landing_pads
    - equip_martian_cargo_crane

  descriptive_capabilities:
    - reusable_freight_landing
    - heavy_cargo_surface_delivery
    - modular_aerodynamic_configuration

  component_layout_stub:
    major_component_groups:
      - cargo_hold
      - main_descent_propulsion
      - reaction_control_system
      - detachable_lifting_wing_mounts
      - landing_gear
      - avionics_and_guidance
      - power_and_support_systems
    configurable_groups:
      - detachable_lifting_wings

  payload_capacity_t: 45
  service_life_cycles: 50

  tags:
    - vehicle
    - spacecraft
    - cargo
    - mars
    - reusable
    - race_for_sol

  start_year: 2180
  entry_status: draft


- id: veh_mdv_3
  pretty_name: MDV-3
  name: MDV-3
  type: vehicle
  idea_reference: IDEA-496
  description: Orbital-built Mars cargo transport vehicle used for high-volume freight transfer between Earth orbit and Mars orbit during the Race for Sol.
  notes: Designed as a larger follow-up to earlier Mars Delivery Vehicle concepts. Unlike earlier atmosphere-capable variants, MDV-3 is a pure space transport and does not perform atmospheric entry. It carries roughly 385 tons of cargo and operates between orbital infrastructure nodes rather than surface delivery points.
  vehicle_class: interplanetary_cargo_transport

  produced_by: []
  uses_technology: []
  operated_by: []

  intended_roles:
    - earth_orbit_to_mars_orbit_cargo_transfer
    - orbital_freight_logistics
    - high_volume_interplanetary_transport

  supported_infrastructure:
    - infra_earth_orbital_cargo_terminals
    - infra_mars_orbital_logistics_hubs
    - infra_orbital_refueling_nodes

  descriptive_capabilities:
    - high_volume_space_freight_transport
    - non_atmospheric_interplanetary_operation
    - orbital_cargo_interface_operation

  component_layout_stub:
    major_component_groups:
      - cargo_module_structure
      - main_transfer_propulsion
      - reaction_control_system
      - docking_and_transfer_interface
      - avionics_and_guidance
      - power_and_support_systems
      - structural_truss_or_hull_frame
    configurable_groups:
      - cargo_module_variants

  payload_capacity_t: 385

  tags:
    - vehicle
    - spacecraft
    - cargo
    - interplanetary
    - orbital
    - mars
    - race_for_sol

  start_year: 2158
  entry_status: draft

