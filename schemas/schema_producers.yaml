schema: producer

extends: entity_core

fields:

  producer_class:
    type: string
    optional: true

  parent_institution:
    type: entity
    target: institution
    optional: true

  controlling_faction:
    type: entity
    target: faction
    optional: true

  associated_cultures:
    type: entity_list
    target: culture
    optional: true

  associated_locations:
    type: entity_list
    target: locations
    optional: true

  produced_vehicles:
    type: entity_list
    target: vehicles
    optional: true

  produced_items:
    type: entity_list
    target: item
    optional: true

  produced_components:
    type: entity_list
    target: components
    optional: true

  design_language:
    type: string_list
    optional: true

