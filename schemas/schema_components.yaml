schema: components

extends: entity_core

fields:

  component_class:
    type: string
    optional: true

  primary_material:
    type: entity
    target: materials
    optional: true

  secondary_materials:
    type: entity_list
    target: materials
    optional: true

  represented_item:
    type: entity
    target: item
    optional: true

  install_contexts:
    type: string_list
    optional: true

  functional_roles:
    type: string_list
    optional: true

  satisfies_categories:
    type: string_list
    optional: true

  operational_groups:
    type: string_list
    optional: true

  subsystem_labels:
    type: string_list
    optional: true

  requires_technology:
    type: entity_list
    target: technology
    optional: true

  descriptive_capabilities:
    type: string_list
    optional: true

  maintenance_notes:
    type: text
    optional: true

  dimension_x_m:
    type: number
    optional: true

  dimension_y_m:
    type: number
    optional: true

  dimension_z_m:
    type: number
    optional: true

  mass_kg:
    type: number
    optional: true

  power_kw:
    type: number
    optional: true

