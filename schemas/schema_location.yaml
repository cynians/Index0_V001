schema: locations

extends: entity_core

fields:

  location_class:
    type: string
    optional: true

  location_role:
    type: string
    optional: true

  parent_location:
    type: entity
    target: locations
    optional: true

  controlling_factions:
    type: entity_list
    target: faction
    optional: true

  associated_cultures:
    type: entity_list
    target: culture
    optional: true

  population:
    type: dict
    optional: true

  coords:
    type: dict
    optional: true

  bounds:
    type: dict
    optional: true

  climate_tags:
    type: string_list
    optional: true

  derived_from_system_body:
    type: entity
    target: systems
    optional: true

  map_projection:
    type: string
    optional: true

  map_status:
    type: string
    optional: true

  map_canvas_width_px:
    type: number
    optional: true

  map_canvas_height_px:
    type: number
    optional: true

  environment_summary:
    type: dict
    optional: true

  atmosphere_summary:
    type: dict
    optional: true

  geology_summary:
    type: dict
    optional: true

  hydrology_summary:
    type: dict
    optional: true

  ecology_summary:
    type: dict
    optional: true

