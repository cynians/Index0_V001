schema: item

extends: entity_core

fields:

  item_class:
    type: string
    optional: true

  primary_material:
    type: entity
    target: materials
    optional: true

  secondary_materials:
    type: entity_list
    target: materials
    optional: true

  component_equivalent:
    type: entity
    target: components
    optional: true

  produced_by:
    type: entity_list
    target: faction
    optional: true

  uses_technology:
    type: entity_list
    target: technology
    optional: true

  storage_modes:
    type: string_list
    optional: true

  handling_notes:
    type: text
    optional: true

  default_state:
    type: string
    optional: true

  portable:
    type: string
    optional: true

  placeable:
    type: string
    optional: true

  installable:
    type: string
    optional: true

  install_contexts:
    type: string_list
    optional: true

  descriptive_capabilities:
    type: string_list
    optional: true

