schema: materials

extends: entity_core

fields:

  material_class:
    type: string
    optional: true

  material_form:
    type: string
    optional: true

  base_materials:
    type: entity_list
    target: materials
    optional: true

  descriptive_properties:
    type: string_list
    optional: true

  hazard_tags:
    type: string_list
    optional: true

  storage_notes:
    type: text
    optional: true

  common_uses:
    type: string_list
    optional: true

  processed_by_technology:
    type: entity_list
    target: technology
    optional: true

