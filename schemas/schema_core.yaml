schema: entity_core

required:
  - id
  - pretty_name
  - type

fields:

  id:
    type: string

  pretty_name:
    type: string

  type:
    type: string

  description:
    type: text
    optional: true

  notes:
    type: text
    optional: true

  tags:
    type: string_list
    optional: true

  start_year:
    type: number
    optional: true

  end_year:
    type: number
    optional: true

  derived_from_ideas:
    type: idea_list
    optional: true