schema: vehicle

extends: entity_core

fields:

  vehicle_class:
    type: string
    optional: true

  produced_by:
    type: entity_list
    target: faction
    optional: true

  uses_technology:
    type: entity_list
    target: technology
    optional: true

  operated_by:
    type: entity_list
    target: formation
    optional: true

  manufacturer_name:
    type: string
    optional: true

  dimension_x_m:
    type: number
    optional: true

  dimension_y_m:
    type: number
    optional: true

  dimension_z_m:
    type: number
    optional: true

  design_catalog_components:
    type: entity_list
    target: components
    optional: true

  design_placed_components:
    type: object_list
    optional: true

  interior_layout:
    type: object_list
    optional: true

  operational_state:
    type: object
    optional: true