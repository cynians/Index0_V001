schema: production

extends: entity_core

fields:

  production_class:
    type: string
    optional: true

  production_location:
    type: entity
    target: locations
    optional: true

  input_materials:
    type: entity_list
    target: materials
    optional: true

  input_items:
    type: entity_list
    target: item
    optional: true

  input_components:
    type: entity_list
    target: components
    optional: true

  output_materials:
    type: entity_list
    target: materials
    optional: true

  output_items:
    type: entity_list
    target: item
    optional: true

  output_components:
    type: entity_list
    target: components
    optional: true

  output_vehicles:
    type: entity_list
    target: vehicles
    optional: true

  output_buildings:
    type: string_list
    optional: true

  byproducts:
    type: string_list
    optional: true

  produced_by:
    type: entity_list
    target: faction
    optional: true

  required_technology:
    type: entity_list
    target: technology
    optional: true

  required_items:
    type: entity_list
    target: item
    optional: true

  required_components:
    type: entity_list
    target: components
    optional: true

  required_roles:
    type: string_list
    optional: true

  required_site_classes:
    type: string_list
    optional: true

  task_chain_description:
    type: text
    optional: true

  supports_repair:
    type: string
    optional: true

  supports_disassembly:
    type: string
    optional: true

  map_representation_notes:
    type: text
    optional: true

  units_per_hour:
    type: number
    optional: true

  units_per_day:
    type: number
    optional: true

  kg_per_hour:
    type: number
    optional: true

  kg_per_day:
    type: number
    optional: true

  liters_per_hour:
    type: number
    optional: true

  liters_per_day:
    type: number
    optional: true

  m2_per_day:
    type: number
    optional: true

  m3_per_day:
    type: number
    optional: true

  components_per_day:
    type: number
    optional: true

  vehicles_per_year:
    type: number
    optional: true

  buildings_per_year:
    type: number
    optional: true

