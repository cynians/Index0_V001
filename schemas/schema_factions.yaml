schema: faction

extends: entity_core

fields:

  faction_class:
    type: string
    optional: true

  parent_faction:
    type: entity
    target: faction
    optional: true

  associated_cultures:
    type: entity_list
    target: culture
    optional: true

  associated_locations:
    type: entity_list
    target: location
    optional: true

  associated_institutions:
    type: entity_list
    target: institution
    optional: true