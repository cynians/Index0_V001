schema: culture

extends: entity_core

fields:

  culture_class:
    type: string
    optional: true

  parent_culture:
    type: entity
    target: culture
    optional: true

  cultural_aspects:
    type: entity_list
    target: cultural_aspect
    optional: true

  associated_factions:
    type: entity_list
    target: faction
    optional: true

  associated_locations:
    type: entity_list
    target: location
    optional: true

  institutions:
    type: entity_list
    target: institution
    optional: true

  belief_systems:
    type: string_list
    optional: true

  moral_values:
    type: string_list
    optional: true

  taboos:
    type: string_list
    optional: true

  mythology:
    type: string_list
    optional: true