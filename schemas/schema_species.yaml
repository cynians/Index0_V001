schema: species

extends: entity_core

fields:

  species_class:
    type: string
    optional: true

  parent_clade:
    type: string
    optional: true

  clade_class:
    type: string
    optional: true

  origin_type:
    type: string
    optional: true

  created_by:
    type: entity_list
    target: faction
    optional: true

  uses_technology:
    type: entity_list
    target: technology
    optional: true

  base_stock_species:
    type: entity_list
    target: species
    optional: true

  native_locations:
    type: entity_list
    target: locations
    optional: true

  seeded_locations:
    type: entity_list
    target: locations
    optional: true

  related_species:
    type: entity_list
    target: species
    optional: true

  descendant_species:
    type: entity_list
    target: species
    optional: true

  habitats:
    type: string_list
    optional: true

  ecological_roles:
    type: string_list
    optional: true

  locomotion_types:
    type: string_list
    optional: true

  diet:
    type: string_list
    optional: true

  primary_prey_species:
    type: entity_list
    target: species
    optional: true

  predator_species:
    type: entity_list
    target: species
    optional: true

  representative_body_length_m:
    type: number
    optional: true

  representative_body_mass_kg:
    type: number
    optional: true

  reproduction_type:
    type: string
    optional: true

  metabolism_class:
    type: string
    optional: true

  lifecycle_notes:
    type: text
    optional: true

  behavioural_traits:
    type: string_list
    optional: true

  morphological_traits:
    type: string_list
    optional: true

  simulation_tier_default:
    type: string
    optional: true

  population_notes:
    type: text
    optional: true

